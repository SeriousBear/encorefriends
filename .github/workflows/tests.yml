# Unit tests — free, fast, run on every push and PR. A red X here means a
# deterministic helper broke; fix before deploying.
name: unit-tests
on:
  push:
  pull_request:
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --no-audit --no-fund
      - run: npm test
